# Package name mapping between Homebrew and apt
# Key is the canonical name (usually brew name)
#
# Fields:
#   brew        - Homebrew package name (optional, defaults to key)
#   cask        - Homebrew cask name (optional)
#   apt         - apt package name (optional, omit if no apt package)
#   apt_cmd     - Command name on apt if different from package name
#   pacman      - pacman package name (optional, omit if no pacman package)
#   portage     - Gentoo portage atom (category/package) (optional)
#   mode        - Installation mode: "base", "development", "desktop"
#   tap         - Homebrew tap (e.g. "k1LoW/tap"), omit if not needed
#   darwin_only - true = brew install on macOS only, skip on Linux (default: false)
#
# OS routing (automatic):
#   macOS        -> brew/cask (if brew or cask field exists)
#   Linux/Arch   -> pacman (if pacman field exists)
#   Linux/Gentoo -> portage (if portage field exists)
#   Linux/other  -> apt (if apt field exists), otherwise brew (unless darwin_only)

# =============================================================================
# Base packages
# =============================================================================

[zsh]
apt = "zsh"
pacman = "zsh"
portage = "app-shells/zsh"
mode = "base"

[fzf]
brew = "fzf"
apt = "fzf"
pacman = "fzf"
portage = "app-shells/fzf"
mode = "base"

