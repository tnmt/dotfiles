"$schema" = 'https://starship.rs/config-schema.json'

palette = "tokyonight_storm"

format = """
[░▒▓](fg:fg_dark)\
$os\
[](bg:blue fg:fg_dark)\
$directory\
[](fg:blue bg:terminal_black)\
$git_branch\
$git_status\
[](fg:terminal_black bg:bg)\
$nodejs\
$rust\
$golang\
$php\
[](fg:bg bg:bg_dark)\
$time\
[ ](fg:bg_dark)\
$all\
$character"""

command_timeout = 1000

[os]
format = "[$symbol ](bg:fg_dark fg:bg_dark)"
disabled = false

[os.symbols]
Macos = "  "  # nf-fa-apple
Ubuntu = "  " # nf-linux-ubuntu
Debian = "  " # nf-linux-debian
NixOS = "  "  # nf-linux-nixos

[directory]
style = "fg:fg bg:blue"
format = "[ $path ]($style)"
truncation_length = 100
truncate_to_repo = false

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[direnv]
disabled = false

[hostname]
ssh_only = false
disabled = false

[git_branch]
symbol = ""
style = "bg:terminal_black"
format = '[[ $symbol $branch ](fg:blue bg:terminal_black)]($style)'

[git_status]
style = "bg:terminal_black"
format = '[[($all_status$ahead_behind )](fg:blue bg:terminal_black)]($style)'

[nodejs]
symbol = ""
style = "bg:bg"
format = '[[ $symbol ($version) ](fg:green bg:bg)]($style)'

[rust]
symbol = ""
style = "bg:bg"
format = '[[ $symbol ($version) ](fg:orange bg:bg)]($style)'

[golang]
symbol = ""
style = "bg:bg"
format = '[[ $symbol ($version) ](fg:cyan bg:bg)]($style)'

[php]
symbol = ""
style = "bg:bg"
format = '[[ $symbol ($version) ](fg:purple bg:bg)]($style)'

[time]
disabled = false
time_format = "%T" # Hour:Minute Format
style = "bg:bg_dark"
format = '[[  $time ](fg:fg_dark bg:bg_dark)]($style)'

[mise]
disabled = false

[palettes.tokyonight_storm]
red = "#f7768e"
orange = "#ff9e64"
yellow = "#e0af68"
green = "#9ece6a"
teal = "#73daca"
cyan = "#7dcfff"
blue = "#7aa2f7"
purple = "#bb9af7"
magenta = "#ff007c"
fg = "#c0caf5"
fg_dark = "#a9b1d6"
comment = "#565f89"
dark5 = "#737aa2"
terminal_black = "#414868"
bg_highlight = "#292e42"
bg = "#24283b"
bg_dark = "#1f2335"
